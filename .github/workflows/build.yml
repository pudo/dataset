name: build

on: [push]

jobs:
  python:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dataset
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql
        env:
          MYSQL_USER: mysql
          MYSQL_PASSWORD: mysql
          MYSQL_DATABASE: dataset
          MYSQL_ROOT_PASSWORD: mysql
        ports:
          - 3306/tcp
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
      - name: Show ref
        run: |
          echo "$GITHUB_REF"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run SQLite tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          make test
      - name: Run PostgreSQL tests
        timeout-minutes: 10
        env:
          DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/dataset"
          # Abort any statement that waits more than 10 s for a lock, and detect
          # deadlocks after 1 s – both ensure stuck tests fail fast with an error
          # rather than hanging the entire CI run.
          PGOPTIONS: "-c lock_timeout=10s -c deadlock_timeout=1s"
        run: |
          make test
      - name: Configure MySQL lock timeout
        run: |
          mysql -h 127.0.0.1 -P ${{ job.services.mysql.ports[3306] }} \
            -u root -pmysql \
            -e "SET GLOBAL innodb_lock_wait_timeout=10;"
      - name: Run mysql tests
        timeout-minutes: 10
        env:
          DATABASE_URL: "mysql+pymysql://mysql:mysql@127.0.0.1:${{ job.services.mysql.ports[3306] }}/dataset?charset=utf8"
        run: |
          make test
      - name: Run ruff to lint
        run: |
          ruff check dataset test
      - name: Build a distribution
        run: |
          python -m build
      - name: Publish a Python distribution to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.pypi_password }}
